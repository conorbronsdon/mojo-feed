[workspace]
authors = ["Conor Bronsdon <cmbronsdon@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "mojo-feed"
description = "RSS, Atom, and JSON Feed parser in pure Mojo"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[tasks]
test = "mojo run -I src test/test_xml_parser.mojo && mojo run -I src test/test_feed.mojo && mojo run -I src test/test_date.mojo && mojo run -I src test/test_real_feed.mojo"
demo = "mojo run -I src examples/list_episodes.mojo test/data/cot_feed.xml 5"
bench = "mojo build -I src bench/bench_parse.mojo -o .bench_parse && ./.bench_parse"
validate = "mojo run -I src examples/validate_feed.mojo"
fmt = "mojo format src/ test/ examples/ bench/"
docs = "mojo doc -o docs/api.json -I src src/feed && python3 docs/render_api.py docs/api.json docs/api.html"

[dependencies]
mojo = ">=1.0.0b3.dev2026070506,<2"
