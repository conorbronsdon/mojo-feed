# rattler-build recipe for publishing mojo-feed to a conda channel
# (e.g. modular-community). Not wired to CI yet — this documents the intended
# distribution shape and is ready to build the day we decide to publish.
#
# Distributes the pure-Mojo SOURCE TREE, not a compiled `.mojopkg`: a .mojopkg
# embeds the exact compiler version and refuses to load against any other, so a
# benign Mojo nightly bump would break every consumer. Shipping source + a
# runtime `mojo` pin gets reproducibility without ABI lock-in.
#
# Build locally with: rattler-build build --recipe recipe.yaml

context:
  version: "0.1.0"

package:
  name: mojo-feed
  version: ${{ version }}

source:
  path: .

build:
  number: 0
  noarch: generic
  script:
    - mkdir -p ${{ PREFIX }}/lib/mojo
    - cp -r src/feed ${{ PREFIX }}/lib/mojo/feed

requirements:
  run:
    - mojo >=1.0.0b3.dev2026070506,<2

about:
  homepage: https://github.com/conorbronsdon/mojo-feed
  repository: https://github.com/conorbronsdon/mojo-feed
  license: MIT
  license_file: LICENSE
  summary: RSS, Atom, and JSON Feed parsing in pure Mojo — mirrors Python's feedparser
